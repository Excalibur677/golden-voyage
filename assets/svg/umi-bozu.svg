<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <!-- Body - large dark blob emerging from water -->
  <ellipse cx="300" cy="380" rx="220" ry="180" fill="#0D3B55" opacity="0.95"/>
  
  <!-- Body highlight -->
  <ellipse cx="270" cy="320" rx="160" ry="120" fill="#164B6B" opacity="0.6"/>
  
  <!-- Head dome -->
  <ellipse cx="300" cy="260" rx="170" ry="150" fill="#0D3B55"/>
  
  <!-- Head texture -->
  <ellipse cx="280" cy="230" rx="110" ry="95" fill="#164B6B" opacity="0.4"/>

  <!-- Left eye socket -->
  <ellipse cx="230" cy="240" rx="35" ry="30" fill="#0A2740" opacity="0.8"/>
  <!-- Left eye glow -->
  <ellipse cx="230" cy="240" rx="20" ry="18" fill="#F4A261"/>
  <ellipse cx="230" cy="240" rx="12" ry="11" fill="#FFE566"/>
  <ellipse cx="225" cy="235" rx="4" ry="3" fill="white" opacity="0.6"/>

  <!-- Right eye socket -->
  <ellipse cx="370" cy="240" rx="35" ry="30" fill="#0A2740" opacity="0.8"/>
  <!-- Right eye glow -->
  <ellipse cx="370" cy="240" rx="20" ry="18" fill="#F4A261"/>
  <ellipse cx="370" cy="240" rx="12" ry="11" fill="#FFE566"/>
  <ellipse cx="365" cy="235" rx="4" ry="3" fill="white" opacity="0.6"/>

  <!-- Mouth / expression -->
  <path d="M255 305 Q300 330 345 305" stroke="#0A2740" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Tentacle 1 - left far -->
  <path d="M120 420 Q80 380 60 480 Q50 510 80 520 Q100 515 110 490 Q125 460 140 440 Z" 
        fill="#0D3B55" opacity="0.85"/>
  
  <!-- Tentacle 2 - left near -->
  <path d="M180 450 Q140 420 130 500 Q125 530 155 530 Q175 525 178 498 Q185 470 195 455 Z"
        fill="#0D3B55" opacity="0.9"/>

  <!-- Tentacle 3 - right near -->
  <path d="M420 450 Q460 420 470 500 Q475 530 445 530 Q425 525 422 498 Q415 470 405 455 Z"
        fill="#0D3B55" opacity="0.9"/>

  <!-- Tentacle 4 - right far -->
  <path d="M480 420 Q520 380 540 480 Q550 510 520 520 Q500 515 490 490 Q475 460 460 440 Z"
        fill="#0D3B55" opacity="0.85"/>

  <!-- Water line / splash -->
  <path d="M50 460 Q150 430 300 445 Q450 430 550 460 L560 520 L40 520 Z" 
        fill="#1B5E7B" opacity="0.7"/>
  <path d="M60 455 Q160 435 300 448 Q440 435 540 455" 
        stroke="#A8DADC" stroke-width="3" opacity="0.5" fill="none"/>

  <!-- Foam around base -->
  <ellipse cx="300" cy="458" rx="230" ry="18" fill="white" opacity="0.15"/>
  <ellipse cx="150" cy="462" rx="80" ry="10" fill="white" opacity="0.2"/>
  <ellipse cx="450" cy="462" rx="80" ry="10" fill="white" opacity="0.2"/>
</svg>
