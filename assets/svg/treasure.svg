<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <!-- Chest base -->
  <rect x="8" y="50" width="104" height="48" rx="6" fill="#5D4037"/>
  <rect x="8" y="50" width="104" height="48" rx="6" stroke="#3E2723" stroke-width="2"/>
  
  <!-- Chest lid -->
  <path d="M8 50 Q8 20 60 18 Q112 20 112 50 Z" fill="#6D4C41"/>
  <path d="M8 50 Q8 20 60 18 Q112 20 112 50" stroke="#3E2723" stroke-width="2" fill="none"/>
  
  <!-- Gold trim - horizontal bands -->
  <rect x="8" y="52" width="104" height="7" rx="2" fill="#F4D03F" opacity="0.8"/>
  <rect x="8" y="72" width="104" height="6" rx="2" fill="#F4D03F" opacity="0.7"/>
  <rect x="8" y="90" width="104" height="6" rx="2" fill="#F4D03F" opacity="0.8"/>

  <!-- Corner reinforcements -->
  <rect x="8" y="50" width="10" height="48" rx="3" fill="#F4D03F" opacity="0.5"/>
  <rect x="102" y="50" width="10" height="48" rx="3" fill="#F4D03F" opacity="0.5"/>

  <!-- Lock -->
  <rect x="47" y="56" width="26" height="20" rx="4" fill="#F4D03F"/>
  <rect x="51" y="58" width="18" height="14" rx="3" fill="#E6B800"/>
  <circle cx="60" cy="63" r="5" fill="#F4D03F" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="57" y="65" width="6" height="6" rx="1" fill="#5D4037"/>

  <!-- Lid trim -->
  <path d="M12 48 Q60 26 108 48" stroke="#F4D03F" stroke-width="4" fill="none" opacity="0.7"/>

  <!-- Gold coins spilling out -->
  <ellipse cx="20" cy="98" rx="8" ry="4" fill="#F4D03F"/>
  <ellipse cx="34" cy="100" rx="7" ry="3.5" fill="#F4D03F"/>
  <ellipse cx="95" cy="99" rx="8" ry="4" fill="#F4D03F"/>
  <ellipse cx="108" cy="97" rx="6" ry="3" fill="#E6B800"/>

  <!-- Glow from within (gold light) -->
  <ellipse cx="60" cy="50" rx="40" ry="8" fill="#FFE566" opacity="0.15"/>
</svg>
