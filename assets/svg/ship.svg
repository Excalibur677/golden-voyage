<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Hull -->
  <path d="M60 200 Q200 240 340 200 L320 240 Q200 270 80 240 Z" fill="#1D3557" opacity="0.9"/>
  <path d="M80 200 Q200 230 320 200 L310 220 Q200 245 90 220 Z" fill="#457B9D"/>

  <!-- Main mast -->
  <line x1="200" y1="60" x2="200" y2="200" stroke="#1D3557" stroke-width="5" stroke-linecap="round"/>

  <!-- Front mast -->
  <line x1="130" y1="90" x2="130" y2="200" stroke="#1D3557" stroke-width="4" stroke-linecap="round"/>

  <!-- Main sail -->
  <path d="M205 65 Q270 120 250 195" stroke="#1D3557" stroke-width="2"/>
  <path d="M205 65 Q275 125 255 195 L205 195 Z" fill="#FEF3E2" opacity="0.92"/>
  <!-- Sail detail lines -->
  <line x1="218" y1="95" x2="248" y2="165" stroke="#A8DADC" stroke-width="1.5" opacity="0.6"/>
  <line x1="228" y1="110" x2="250" y2="175" stroke="#A8DADC" stroke-width="1" opacity="0.4"/>

  <!-- Second sail -->
  <path d="M195 65 Q130 115 155 195" stroke="#1D3557" stroke-width="2"/>
  <path d="M195 65 Q128 118 152 195 L195 195 Z" fill="#FEF3E2" opacity="0.8"/>

  <!-- Front sail -->
  <path d="M133 93 Q175 130 160 195 L133 195 Z" fill="#FFE0B2" opacity="0.85"/>

  <!-- Crow's nest -->
  <rect x="192" y="58" width="16" height="10" rx="2" fill="#1D3557"/>

  <!-- Flag -->
  <line x1="200" y1="60" x2="200" y2="30" stroke="#1D3557" stroke-width="2.5"/>
  <path d="M200 30 L230 40 L200 50 Z" fill="#E63946"/>

  <!-- Portholes -->
  <circle cx="140" cy="212" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="170" cy="216" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="200" cy="218" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="230" cy="216" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="260" cy="212" r="5" fill="#A8DADC" opacity="0.6"/>

  <!-- Rigging lines -->
  <line x1="200" y1="65" x2="130" y2="95" stroke="#1D3557" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="100" x2="130" y2="110" stroke="#1D3557" stroke-width="1" opacity="0.4"/>

  <!-- Water line reflection -->
  <ellipse cx="200" cy="242" rx="120" ry="8" fill="#2E86AB" opacity="0.3"/>
</svg>
