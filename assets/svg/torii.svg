<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 280" fill="none">
  <!-- Top kasagi (top beam) - curved -->
  <path d="M5 60 Q80 30 155 60 L155 75 Q80 48 5 75 Z" fill="#E63946"/>
  
  <!-- Shimagi (second beam) -->
  <rect x="15" y="80" width="130" height="14" rx="3" fill="#E63946"/>
  
  <!-- Left pillar -->
  <rect x="22" y="90" width="18" height="185" rx="4" fill="#C0392B"/>
  <!-- Left pillar base -->
  <rect x="16" y="268" width="30" height="12" rx="3" fill="#C0392B"/>
  
  <!-- Right pillar -->
  <rect x="120" y="90" width="18" height="185" rx="4" fill="#C0392B"/>
  <!-- Right pillar base -->
  <rect x="114" y="268" width="30" height="12" rx="3" fill="#C0392B"/>

  <!-- Nuki (horizontal tie beam) -->
  <rect x="22" y="160" width="116" height="10" rx="2" fill="#E63946" opacity="0.8"/>

  <!-- Decorative detail on top beam -->
  <path d="M5 60 Q80 30 155 60" stroke="#C0392B" stroke-width="2" opacity="0.5"/>

  <!-- Glow accent lines -->
  <rect x="22" y="90" width="4" height="185" rx="2" fill="#F4A261" opacity="0.3"/>
  <rect x="134" y="90" width="4" height="185" rx="2" fill="#F4A261" opacity="0.3"/>
</svg>
